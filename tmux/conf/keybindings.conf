# Keybindings -- all prefix and non-prefix binds in one place.

##################################################
# PREFIX

# Unbind default prefix (Ctrl+B)
unbind C-b

# Set prefix to Ctrl+H
set -g prefix C-h
bind C-h send-prefix

##################################################
# CONFIG

# Reload config
bind r source-file ~/.tmux.conf\; display-message "Config reloaded"

##################################################
# SPLITS (open in same directory)

bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"

##################################################
# PANE NAVIGATION (vim keys)

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

##################################################
# PANE RESIZING (vim keys, uppercase, 5-cell increments)

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

##################################################
# WINDOWS

# Shift-arrow to switch windows (no prefix needed)
bind -n S-Left  previous-window
bind -n S-Right next-window

# Cycle layouts
bind Space next-layout

##################################################
# DISPLAY

# Show pane numbers
bind q display-panes

##################################################
# COPY MODE (vi-style + system clipboard)

bind [ copy-mode
bind ] paste-buffer

# In copy mode: v to begin selection, y to yank to clipboard
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# Mouse drag auto-copies to clipboard
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

##################################################
# SESSION MANAGEMENT

# Fuzzy session picker
bind f display-popup -E -w 60% -h 60% "$HOME/.tmux/scripts/session-picker.sh"

# Save and restore sessions
bind S run-shell "$HOME/.tmux/scripts/session-save.sh"
bind R run-shell "$HOME/.tmux/scripts/session-restore.sh"

##################################################
# POPUP TERMINAL

# Floating scratch terminal (80% width/height)
bind t display-popup -E -w 80% -h 80% -d "#{pane_current_path}"

##################################################
# CLAUDE
#
# Spawn a named claude-code session.
#   :claw NAME       -> new window named NAME, running `claude --name NAME`
#   :clap NAME       -> new pane with title NAME, running `claude --name NAME`
#   prefix + W / P   -> same, via interactive prompt
#
# Both command-alias and keybind route through command-prompt. The alias
# pre-fills via %1; pressing Enter confirms. A bare `:claw` opens an empty
# prompt.

set -g command-alias[100] 'claw=command-prompt -p "claude window name:" -I "%1" { new-window -c "#{pane_current_path}" -n "%%" "claude --name %%" }'
set -g command-alias[101] 'clap=command-prompt -p "claude pane name:"   -I "%1" { split-window -h -c "#{pane_current_path}" "claude --name %%" ; select-pane -T "%%" }'

bind W command-prompt -p "claude window name:" { new-window -c "#{pane_current_path}" -n "%%" "claude --name %%" }
bind P command-prompt -p "claude pane name:"   { split-window -h -c "#{pane_current_path}" "claude --name %%" ; select-pane -T "%%" }
