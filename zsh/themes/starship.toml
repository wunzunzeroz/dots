# Starship prompt -- Tokyo Night Storm theme (powerline style)
# Colored background segments with powerline arrow separators.

format = """
$directory\
$git_branch\
$git_status\
$fill\
$jobs\
$docker_context\
$python\
$ruby\
$nodejs\
$cmd_duration\
$line_break\
$character"""

add_newline = false

[character]
success_symbol = "[❯](bold #9ece6a)"
error_symbol = "[❯](bold #f7768e)"
vimcmd_symbol = "[❮](bold #7aa2f7)"

[directory]
format = "[  $path ]($style)[](fg:#7aa2f7 bg:#9ece6a)"
style = "bold fg:#1a1b26 bg:#7aa2f7"
truncation_length = 3
truncate_to_repo = true

[git_branch]
format = "[  $branch ]($style)[](fg:#9ece6a bg:#1a1b26)"
style = "fg:#1a1b26 bg:#9ece6a"

[git_status]
format = "( $all_status$ahead_behind)"
style = ""
conflicted = "[=${count}](bold #f7768e)  "
ahead = "[⇡${count}](#9ece6a)  "
behind = "[⇣${count}](#e0af68)  "
diverged = "[⇕${count}](#f7768e)  "
untracked = "[?${count}](#7dcfff)  "
stashed = "[*${count}](#bb9af7)  "
modified = "[!${count}](#e0af68)  "
staged = "[+${count}](#9ece6a)  "
deleted = "[✘${count}](#f7768e)  "

[jobs]
format = "[ $number]($style) "
style = "#e0af68"
number_threshold = 1

[nodejs]
format = "[ $version]($style) "
style = "#9ece6a"
detect_files = ["package.json", ".node-version"]

[python]
format = "[ $version]($style) "
style = "#e0af68"

[ruby]
format = "[ $version]($style) "
style = "#f7768e"

[docker_context]
format = "[ $context]($style) "
style = "#7dcfff"

[cmd_duration]
min_time = 2_000
format = "[$duration]($style) "
style = "#414868"

[fill]
symbol = " "
