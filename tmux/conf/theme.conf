# Tokyo Night Storm palette
# Swap this file to change the entire color scheme.

# Core palette
set -g @theme-bg     "#1a1b26"
set -g @theme-fg     "#a9b1d6"
set -g @theme-black  "#414868"
set -g @theme-red    "#f7768e"
set -g @theme-green  "#9ece6a"
set -g @theme-yellow "#e0af68"
set -g @theme-blue   "#7aa2f7"
set -g @theme-magenta "#bb9af7"
set -g @theme-cyan   "#7dcfff"
set -g @theme-white  "#c0caf5"

# Semantic aliases
set -g @theme-accent   "#7aa2f7"
set -g @theme-active   "#bb9af7"
set -g @theme-inactive "#414868"
set -g @theme-alert    "#f7768e"
set -g @theme-ok       "#9ece6a"

# Pane borders (raw hex -- style options don't support format expansion)
set -g pane-border-style        "fg=#414868"
set -g pane-active-border-style "fg=#bb9af7"

# Pane border title bar (Zellij-style)
set -g pane-border-status top
set -g pane-border-lines curved
set -g pane-border-format "#{?pane_active,#[fg=#bb9af7]#[bg=default]#[fg=#1a1b26#,bg=#bb9af7#,bold]  #{pane_index}: #{pane_current_command} #[fg=#bb9af7#,bg=default],#[fg=#414868]#[bg=default]#[fg=#a9b1d6#,bg=#414868]  #{pane_index}: #{pane_current_command} #[fg=#414868#,bg=default]}"

# Messages and command prompt
set -g message-style         "fg=#7dcfff,bg=#1a1b26"
set -g message-command-style "fg=#7dcfff,bg=#1a1b26"

# Copy mode / selection highlight
set -g mode-style "fg=#1a1b26,bg=#7aa2f7"

# Clock mode
set -g clock-mode-colour "#7aa2f7"
