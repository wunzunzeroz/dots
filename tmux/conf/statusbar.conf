# Status bar -- uses @theme-* variables from theme.conf.
#
# Glyph reference:
#   Powerline arrows:     (left solid)   (left thin)   (right solid)   (right thin)
#   Rounded caps:         (left round)   (right round)
#   Icons (nerd fonts):   (session)   (git branch)  󰓇 (spotify)
#                          (network/IP)  󰥔 (clock)  󰍉 (zoom/search)

# Update interval (5s is enough for git branch + spotify)
set -g status-interval 5

# Status bar position and base style (raw hex -- style options don't expand formats)
set -g status-style "fg=#a9b1d6,bg=#1a1b26"

##################################################
# LEFT STATUS

set -g status-left-length 200

# Segments: [ session][ branch] -> (fade to bg)
#
# Arrow color logic:
#   green->blue arrow: fg=green, bg=blue
#   blue->bg arrow:    fg=blue, bg=default(bg)
set -g status-left "\
#[fg=#{@theme-ok},bg=#{@theme-bg}]\
#[fg=#{@theme-bg},bg=#{@theme-ok},bold]  #S \
#[fg=#{@theme-ok},bg=#{@theme-accent},nobold]\
#[fg=#{@theme-bg},bg=#{@theme-accent}] #($HOME/.tmux/scripts/git-branch.sh #{pane_current_path}) \
#[fg=#{@theme-accent},bg=#{@theme-bg}] "

##################################################
# RIGHT STATUS

set -g status-right-length 500

# Segments (left to right): [zoom] [spotify] [IP] [date/time]
#
# Arrow color logic (right side uses reverse arrows ):
#   bg->cyan:       fg=cyan, bg=default(bg)
#   cyan->magenta:  fg=active, bg=cyan
#   magenta->green: fg=ok, bg=active
set -g status-right "\
#{?window_zoomed_flag,#[fg=#{@theme-yellow},bg=#{@theme-bg}] 󰍉 ,}\
#[fg=#{@theme-cyan},bg=#{@theme-bg}]\
#[fg=#{@theme-bg},bg=#{@theme-cyan}] 󰓇 #(osascript ~/dots/macos/spotify.scpt) \
#[fg=#{@theme-active},bg=#{@theme-cyan}]\
#[fg=#{@theme-bg},bg=#{@theme-active}]  #(ipconfig getifaddr en0) \
#[fg=#{@theme-ok},bg=#{@theme-active}]\
#[fg=#{@theme-bg},bg=#{@theme-ok}] 󰥔 %d %b %R \
#[fg=#{@theme-ok},bg=#{@theme-bg}]"

##################################################
# WINDOW TABS (center)

set -g status-justify centre

# Inactive window: rounded caps for a softer look
set -g window-status-format "\
#[fg=#{@theme-inactive},bg=#{@theme-bg}]\
#[fg=#{@theme-fg},bg=#{@theme-inactive}] #I:#W \
#[fg=#{@theme-inactive},bg=#{@theme-bg}]"

# Active window: rounded caps with accent color (bold)
set -g window-status-current-format "\
#[fg=#{@theme-active},bg=#{@theme-bg}]\
#[fg=#{@theme-bg},bg=#{@theme-active},bold] #I:#W \
#[fg=#{@theme-active},bg=#{@theme-bg}]"

# Activity style (overrides inactive window fg when activity detected)
set -g window-status-activity-style "fg=#e0af68,bg=#414868"

# Separator between window tabs
set -g window-status-separator " "
