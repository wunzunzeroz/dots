# Starship prompt -- Tokyo Night Storm theme (powerline style)
# Colored background segments with powerline arrow separators.

format = """
$directory\
$git_branch\
$nodejs\
$python\
$ruby\
$docker_context\
$fill\
$git_status\
$cmd_duration\
$line_break\
$character"""

add_newline = false

[character]
success_symbol = "[❯](bold #9ece6a)"
error_symbol = "[❯](bold #f7768e)"
vimcmd_symbol = "[❮](bold #7aa2f7)"

[directory]
format = "[  $path ]($style)[](fg:#7aa2f7 bg:#9ece6a)"
style = "bold fg:#1a1b26 bg:#7aa2f7"
truncation_length = 3
truncate_to_repo = true

[git_branch]
format = "[  $branch ]($style)[](fg:#9ece6a bg:#1a1b26)"
style = "fg:#1a1b26 bg:#9ece6a"

[git_status]
format = "([](fg:#e0af68 bg:#1a1b26)[ $all_status$ahead_behind]($style)[](fg:#e0af68 bg:#1a1b26))"
style = "fg:#1a1b26 bg:#e0af68"
conflicted = "[=](bold #f7768e)"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕${count}"
untracked = "?${count}"
stashed = "*${count}"
modified = "!${count}"
staged = "+${count}"
deleted = "✘${count}"

[nodejs]
format = "[  ($version)]($style)[](fg:#9ece6a bg:#1a1b26)"
style = "fg:#1a1b26 bg:#9ece6a"
detect_files = ["package.json", ".node-version"]

[python]
format = "[  ($version)]($style)[](fg:#e0af68 bg:#1a1b26)"
style = "fg:#1a1b26 bg:#e0af68"

[ruby]
format = "[  ($version)]($style)[](fg:#f7768e bg:#1a1b26)"
style = "fg:#1a1b26 bg:#f7768e"

[docker_context]
format = "[  $context]($style)[](fg:#7dcfff bg:#1a1b26)"
style = "fg:#1a1b26 bg:#7dcfff"

[cmd_duration]
min_time = 2_000
format = "[$duration]($style) "
style = "#414868"

[fill]
symbol = " "
