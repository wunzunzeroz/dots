# Status bar -- uses @theme-* variables from theme.conf.
#
# Powerline glyphs:
#   î‚° U+E0B0 right arrow (solid)
#   î‚² U+E0B2 left arrow (solid)
#   î‚´ U+E0B4 right cap (rounded)
#   î‚¶ U+E0B6 left cap (rounded)
#
# Nerd Font icons:
#   َ°®ھ terminal  î‚  git branch  َ°“‡ spotify
#   َ°©  network  َ°¥” clock  َ°€® zoom

# Update interval (5s is enough for git branch + spotify)
set -g status-interval 5

# Status bar position and base style (raw hex -- style options don't expand formats)
set -g status-style "fg=#a9b1d6,bg=#1a1b26"

##################################################
# LEFT STATUS

set -g status-left-length 200

# Segments: [َ°®ھ session]î‚°[î‚  git-branch]î‚°(fade to bg)
set -g status-left "\
#[fg=#{@theme-bg},bg=#{@theme-ok},bold] َ°®ھ #S \
#[fg=#{@theme-ok},bg=#{@theme-accent},nobold]î‚°\
#[fg=#{@theme-bg},bg=#{@theme-accent}] î‚ #($HOME/.tmux/scripts/git-branch.sh #{pane_current_path}) \
#[fg=#{@theme-accent},bg=#{@theme-bg}]î‚° "

##################################################
# RIGHT STATUS

set -g status-right-length 500

# Segments: [zoom] î‚²[َ°“‡ spotify]î‚²[َ°©  IP]î‚²[َ°¥” date/time]
set -g status-right "\
#{?window_zoomed_flag,#[fg=#{@theme-yellow}] َ°€® ,}\
#[fg=#{@theme-cyan},bg=#{@theme-bg}]î‚²\
#[fg=#{@theme-bg},bg=#{@theme-cyan}] َ°“‡ #(osascript ~/dots/macos/spotify.scpt) \
#[fg=#{@theme-active},bg=#{@theme-cyan}]î‚²\
#[fg=#{@theme-bg},bg=#{@theme-active}] َ°©  #(ipconfig getifaddr en0) \
#[fg=#{@theme-ok},bg=#{@theme-active}]î‚²\
#[fg=#{@theme-bg},bg=#{@theme-ok}] َ°¥” %d %b %R "

##################################################
# WINDOW TABS (center)

set -g status-justify centre

# Inactive window: rounded caps
set -g window-status-format "\
#[fg=#{@theme-inactive},bg=#{@theme-bg}]î‚´\
#[fg=#{@theme-fg},bg=#{@theme-inactive}] #I:#W \
#[fg=#{@theme-inactive},bg=#{@theme-bg}]î‚¶"

# Active window: rounded caps with accent color (bold)
set -g window-status-current-format "\
#[fg=#{@theme-active},bg=#{@theme-bg}]î‚´\
#[fg=#{@theme-bg},bg=#{@theme-active},bold] #I:#W \
#[fg=#{@theme-active},bg=#{@theme-bg}]î‚¶"

# Activity style (overrides inactive window fg when activity detected)
set -g window-status-activity-style "fg=#e0af68,bg=#414868"

# Separator between window tabs
set -g window-status-separator " "
